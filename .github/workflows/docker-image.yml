name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: sudo docker build . --tag mdamanu/aman
    - name: Push the docker image
      run: sudo docker push mdamanu/aman
  deploy:
    
    runs-on: self-hosted
    needs: build

    steps:
    - name: Deploy and restart the containers
      run: sudo ~/containers.sh